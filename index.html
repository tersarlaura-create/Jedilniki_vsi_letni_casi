<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celoten nabor jedilnikov PKL</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #592c82; --light-purple: #cdc3d8; --white: #ffffff; }
        body { font-family: Gotham, "Helvetica Neue", Helvetica, Arial, "sans-serif"; sans-serif; background-color: #cdc3d8; margin: 0; display: flex; justify-content: center; }
        .container { background-color: var(--white); width: 100%; max-width: 500px; min-height: 100vh; padding: 40px 20px; box-sizing: border-box; text-align: center; }
        
        .logo { width: 130px; border-radius: 0%; margin-bottom: 20px; }
        h1 { color: var(--purple); font-size: 1.3rem; margin-bottom: 30px; text-transform: uppercase; }

        /* Gumbi na prvi strani */
        .main-menu { display: flex; flex-direction: column; gap: 12px; }
        .btn { 
            background: var(--white); border: 2px solid var(--light-purple); color: var(--purple); 
            padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; 
            cursor: pointer; font-size: 1rem; transition: 0.3s;
        }
        .btn:hover { background: var(--light-purple); color: white; }

        /* Seznam PDF-jev (skrit na začetku) */
        .pdf-section { display: none; text-align: left; animation: fadeIn 0.5s; }
        .pdf-item { 
            background: var(--light-purple); padding: 15px; margin: 10px 0; 
            border-radius: 6px; display: flex; align-items: center; justify-content: space-between;
        }
        .pdf-item a { color: var(--purple); text-decoration: none; font-weight: 500; flex-grow: 1; }
        .back-btn { background: none; border: none; color: #666; cursor: pointer; margin-bottom: 20px; font-size: 0.9rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 600px) { body { background: white; } .container { box-shadow: none; } }
    </style>
</head>

	<h1 id="title">PRIMERI JEDILNIKOV ZA VSE LETNE ČASE</h1>
		
    <div id="mainMenu" class="main-menu">
        <button class="btn" onclick="showPdf('1600kcal')">1600 kcal</button>
        <button class="btn" onclick="showPdf('1900kcal')">1900 kcal</button>
        <button class="btn" onclick="showPdf('2200kcal')">2200 kcal</button>
        <button class="btn" onclick="showPdf('2500kcal')">2500 kcal</button>
        <button class="btn" onclick="showPdf('2800kcal')">2800 kcal</button>
    </div>
    <div id="pdfSection" class="pdf-section">
        <button class="back-btn" onclick="goBack()">← Nazaj na izbiro</button>
        <h2 id="selectedCategory" style="color: var(--purple);"></h2>
        <div id="pdfList"></div>
    </div>
</div>
<script>
    const data = {
        '1600kcal': [
            { name: 'Jesen - 1600 kcal', url: '1600kcal_jesen.pdf' },
            { name: 'Zima - 1600 kcal', url: '1600kcal_zima.pdf' },
            { name: 'Pomlad - 1600 kcal', url: '1600kcal_pomlad.pdf' },
            { name: 'Poletje - 1600 kcal', url: '1600kcal_poletje.pdf' }
        ],
        '1900kcal': [
            { name: 'Jesen - 1900 kcal', url: '1900kcal_jesen.pdf' },
            { name: 'Zima - 1900 kcal', url: '1900kcal_zima.pdf' },
            { name: 'Pomlad - 1900 kcal', url: '1900kcal_pomlad.pdf' },
            { name: 'Poletje - 1900 kcal', url: '1900kcal_poletje.pdf' }
        ],
        '2200kcal': [
            { name: 'Jesen - 2200 kcal', url: '2200kcal_jesen.pdf' },
            { name: 'Zima - 2200 kcal', url: '2200kcal_zima.pdf' },
            { name: 'Pomlad - 2200 kcal', url: '2200kcal_pomlad.pdf' },
            { name: 'Poletje - 2200 kcal', url: '2200kcal_poletje.pdf' }
        ],
        '2500kcal': [
            { name: 'Jesen - 2500 kcal', url: '2500kcal_jesen.pdf' },
            { name: 'Zima - 2500 kcal', url: '2500kcal_zima.pdf' },
            { name: 'Pomlad - 2500 kcal', url: '2500kcal_pomlad.pdf' },
            { name: 'Poletje - 2500 kcal', url: '2500kcal_poletje.pdf' }
        ],
        '2800kcal': [
            { name: 'Jesen - 2800 kcal', url: '2800kcal_jesen' },
            { name: 'Zima - 2800 kcal', url: '2800kcal_zima.pdf' },
            { name: 'Pomlad - 2800 kcal', url: '2800kcal_pomlad.pdf' },
            { name: 'Poletje - 2800 kcal', url: '2800kcal_poletje.pdf' }
        ]
    };

    function showPdf(category) {
        // Skrij meni in pokaži PDF sekcijo
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('pdfSection').style.display = 'block';
        document.getElementById('selectedCategory').innerText = category;
        
        const list = document.getElementById('pdfList');
        list.innerHTML = ''; // Izprazni prejšnji seznam
        
        // Ustvari gumbe za PDF-je
        data[category].forEach(item => {
            list.innerHTML += `
                <div class="pdf-item">
                    <a href="${item.url}" target="_blank">${item.name}</a>
                    <span class="pdf-badge">PDF</span>
                </div>`;
        });
    }

    function goBack() {
        // Skrij PDF sekcijo in pokaži meni
        document.getElementById('mainMenu').style.display = 'flex';
        document.getElementById('pdfSection').style.display = 'none';
    }
</script>

</body>
</html>
